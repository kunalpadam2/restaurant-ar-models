<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Butter Chicken AR</title>
  <script src="https://cdn.jsdelivr.net/npm/aframe@1.4.2/dist/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <style>
    html, body { margin: 0; overflow: hidden; width: 100%; height: 100%; }
    #overlay {
      position: absolute; top: 20px; left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.65); color: white;
      padding: 10px 20px; border-radius: 24px;
      font-family: sans-serif; font-size: 15px;
      z-index: 999; text-align: center;
      pointer-events: none; white-space: nowrap;
    }
  </style>
</head>
<body>
  <div id="overlay">Point camera at the table marker</div>

  <a-scene
    mindar-image="imageTargetSrc: butter-chicken.mind; autoStart: true; uiLoading: no; uiError: no; uiScanning: no;"
    color-space="sRGB"
    renderer="colorManagement: true; physicallyCorrectLights: true;"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false">

    <a-assets>
      <a-asset-item id="food-model" src="butter-chicken.glb"></a-asset-item>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity mindar-image-target="targetIndex: 0">
      <a-gltf-model
        src="#food-model"
        position="0 0.1 0"
        rotation="0 0 0"
        scale="0.0001 0.0001 0.0001"
        animation="property: rotation; to: 0 360 0; loop: true; dur: 8000; easing: linear">
      </a-gltf-model>
    </a-entity>

  </a-scene>

  <script>
    const scene = document.querySelector('a-scene');
    scene.addEventListener('arReady', () => {
      document.getElementById('overlay').textContent = 'Scanning for marker...';
    });
    scene.addEventListener('targetFound', () => {
      document.getElementById('overlay').style.display = 'none';
    });
    scene.addEventListener('targetLost', () => {
      document.getElementById('overlay').style.display = 'block';
      document.getElementById('overlay').textContent = 'Point camera at the table marker';
    });
  </script>
</body>
</html>
