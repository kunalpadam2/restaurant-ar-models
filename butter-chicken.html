<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AR Food Viewer</title>
  <script type="module"
    src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js">
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #111; height: 100vh; display: flex;
           flex-direction: column; align-items: center;
           justify-content: center; font-family: sans-serif; }
    model-viewer {
      width: 100vw;
      height: 80vh;
    }
    #ar-btn {
      background: #ff6b00;
      color: white;
      border: none;
      padding: 16px 36px;
      font-size: 18px;
      border-radius: 40px;
      cursor: pointer;
      margin-top: 16px;
    }
  </style>
</head>
<body>

  <model-viewer
    id="viewer"
    src="butter-chicken.glb"
    ios-src="butter-chicken.usdz"
    alt="Butter Chicken"
    ar
    ar-modes="webxr scene-viewer quick-look"
    camera-controls
    auto-rotate
    shadow-intensity="1">

    <button slot="ar-button" id="ar-btn">
      📷 View on your table
    </button>

  </model-viewer>

  <script>
    const viewer = document.getElementById('viewer');
    viewer.addEventListener('error', (e) => {
      console.error('Model failed to load:', e.detail);
      document.body.innerHTML += '<p style="color:red;padding:20px">Model failed to load. Check file path.</p>';
    });
  </script>

</body>
</html>
