<!DOCTYPE html>
<html>
<head>
  <title>Butter Chicken - AR View</title>
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <style>
    body { margin: 0; background: #000; }
    model-viewer { width: 100vw; height: 100vh; }
  </style>
</head>
<body>
  <model-viewer
    src="butter-chicken.glb"
    ios-src="butter-chicken.usdz"
    alt="Butter Chicken 3D Model"
    ar
    ar-modes="webxr scene-viewer quick-look"
    camera-controls
    auto-rotate>
  </model-viewer>
</body>
</html><!DOCTYPE html>
<html>
<head>
  <title>Butter Chicken - AR View</title>
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <style>
    body { margin: 0; background: #000; }
    model-viewer { width: 100vw; height: 100vh; }
  </style>
</head>
<body>
  <model-viewer
  src="butter-chicken.glb"
  ios-src="butter-chicken.usdz"
  alt="Butter Chicken"
  ar
  ar-modes="webxr scene-viewer quick-look"
  camera-controls
  auto-rotate
  ar-button-style="bottom: 16px; left: 50%; transform: translateX(-50%);">

  <!-- Custom AR button -->
  <button slot="ar-button" style="
    background: #ff6b00;
    color: white;
    border: none;
    padding: 14px 28px;
    font-size: 18px;
    border-radius: 30px;
    cursor: pointer;
    position: absolute;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
  ">
    📷 View on your table
  </button>

</model-viewer>
</body>
</html>
